server {
	listen 80 default_server;
	listen [::]:80 default_server;

	root /var/www/CunaEdu;
  charset=utf-8;
	index index.html index.htm index.nginx-debian.html;

	server_name cunaedu.ru www.cunaedu.ru;

  location ~* \.(html|js|css)$ {
    add_header Cache-Control "public, max-age=600, must-revalidate";
}

	location / {
		try_files $uri $uri/ /index.html;
	}

}


server {

	root /var/www/CunaEdu;
  charset=utf-8;
	index index.html index.htm index.nginx-debian.html;
    server_name cunaedu.ru; 

location ~* \.(html|js|css)$ {
    add_header Cache-Control "public, max-age=600, must-revalidate";
}

	location / {
		try_files $uri $uri/ /index.html;
	}


    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cunaedu.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cunaedu.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = cunaedu.ru) {
        return 301 https://$host$request_uri;
    } 

	listen 80 ;
	listen [::]:80 ;
    server_name cunaedu.ru;
    return 404;
}